stack_technique:

  weweb:

    keep:
      - breaking change
      - dépréciation d'une fonctionnalité utilisée
      - changement tarifaire
      - limitation de plan
      - nouvelle contrainte de production
      - changement de politique produit
      - migration obligatoire
      - remplacement possible d'un plugin tiers
      - nouvelle intégration directement exploitable dans ArchiFact
      - nouvelle intégration directement exploitable dans SiteNote
      - gain significatif de productivité développement
      - réduction de dette technique

    ignore:
      - tout le reste
      - posts marketing
      - témoignages clients
      - success stories
      - webinaires
      - événements
      - annonces RH
      - tutoriels débutants
      - cas d'usage génériques
      - nouveaux composants UI sans impact direct
      - améliorations mineures de l'éditeur
      - corrections mineures
      - changements visuels mineurs
      - annonces déjà reçues par email sans action possible

    agir_triggers:
      - risque de casse sur ArchiFact
      - risque de casse sur SiteNote
      - migration obligatoire
      - économie de coût
      - économie de temps supérieure à 2 heures par mois
      - suppression ou remplacement d'un plugin
      - réduction de dette technique
      - amélioration majeure de sécurité
      - amélioration majeure de performance
      - amélioration UX majeure pour ArchiFact
      - amélioration UX majeure pour SiteNote
      - fonctionnalité pouvant accélérer la commercialisation
      - changement tarifaire significatif
      - limitation de plan impactant la production

  supabase:

    keep:
      - breaking change
      - dépréciation d'une fonctionnalité utilisée
      - migration obligatoire
      - changement Data API
      - changement RLS
      - changement Auth
      - changement Storage
      - changement Edge Functions
      - changement PostgreSQL managé
      - changement de sécurité
      - nouvelle contrainte de permissions
      - évolution des quotas
      - limitation de plan
      - changement tarifaire
      - nouvelle fonctionnalité réduisant la complexité backend
      - nouvelle fonctionnalité utile à ArchiFact
      - nouvelle fonctionnalité utile à SiteNote

    ignore:
      - tout le reste
      - posts marketing
      - témoignages clients
      - success stories
      - événements
      - webinaires
      - annonces RH
      - tutoriels débutants
      - cas d'usage génériques
      - nouveautés sans impact sur mes projets
      - corrections mineures
      - améliorations mineures de dashboard
      - annonces déjà reçues par email sans action possible

    agir_triggers:
      - risque de casse sur ArchiFact
      - risque de casse sur SiteNote
      - migration obligatoire
      - risque sécurité
      - amélioration majeure de sécurité
      - amélioration majeure de performance
      - impact RLS
      - impact Auth
      - impact Storage
      - impact Edge Functions
      - impact Data API
      - impact production
      - économie de coût
      - réduction dette technique
      - simplification backend significative
      - gain de performance visible pour l'utilisateur
      - limitation de plan impactant la production
      - changement tarifaire significatif

  stripe:

    keep:
      - breaking change
      - dépréciation d'API utilisée
      - changement Checkout
      - changement Billing
      - changement Subscription
      - changement Webhook
      - changement Tax
      - évolution facturation électronique
      - évolution réglementation Europe
      - changement tarifaire
      - nouvelle fonctionnalité utile à ArchiFact
      - nouvelle fonctionnalité utile à SiteNote
      - amélioration sécurité paiements
      - nouvelle contrainte de conformité

    ignore:
      - tout le reste
